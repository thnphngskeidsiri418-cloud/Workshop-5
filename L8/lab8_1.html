<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 8.1: ระบบคำนวณสินเชื่อและตารางผ่อนชำระ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4">

    <div class="max-w-4xl mx-auto bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
        <h2 class="text-2xl font-bold text-slate-800 mb-1 text-center md:text-left">🏦 ระบบคำนวณสินเชื่อและตารางผ่อนชำระ (Lab 8.1)</h2>
        <p class="text-slate-500 text-sm mb-6 text-center md:text-left">วิชา CSI204: การสร้างตารางข้อมูลอัตโนมัติด้วยการทำซ้ำ (For Loop)</p>

        <div class="bg-slate-50 p-5 rounded-xl mb-6 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">💰 จำนวนเงินกู้ (บาท):</label>
                <input type="number" id="loanAmount" value="500000" placeholder="ตัวอย่าง 500000"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 bg-white">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">📈 อัตราดอกเบี้ย (% ต่อปี):</label>
                <input type="number" id="interestRate" value="6" step="0.1" placeholder="ตัวอย่าง 6"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 bg-white">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">📅 ระยะเวลาผ่อนชำระ (ปี):</label>
                <input type="number" id="years" value="3" placeholder="ตัวอย่าง 3"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 bg-white">
            </div>
            <div class="md:col-span-3 mt-2">
                <button onclick="generateAmortizationTable()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-lg transition shadow-sm">
                    🧮 คำนวณและสร้างตารางผ่อนชำระ
                </button>
            </div>
        </div>

        <div id="summarySection" class="hidden bg-indigo-50 border border-indigo-100 rounded-xl p-5 mb-6 grid grid-cols-1 sm:grid-cols-3 gap-4 text-slate-700">
            <div class="text-center sm:text-left">
                <p class="text-xs text-indigo-600 font-semibold uppercase tracking-wider">ค่างวดต่อเดือน</p>
                <p class="text-2xl font-bold text-indigo-700" id="sumMonthlyPayment">0.00 บาท</p>
            </div>
            <div class="text-center sm:text-left border-y sm:border-y-0 sm:border-x border-indigo-200 py-2 sm:py-0 sm:px-4">
                <p class="text-xs text-emerald-600 font-semibold uppercase tracking-wider">ดอกเบี้ยรวมทั้งหมด</p>
                <p class="text-2xl font-bold text-emerald-700" id="sumTotalInterest">0.00 บาท</p>
            </div>
            <div class="text-center sm:text-left">
                <p class="text-xs text-rose-600 font-semibold uppercase tracking-wider">ยอดรวมชำระทั้งหมด</p>
                <p class="text-2xl font-bold text-rose-700" id="sumTotalPay">0.00 บาท</p>
            </div>
        </div>

        <div id="tableContainer" class="overflow-x-auto rounded-xl border border-slate-200 hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-800 text-white text-sm font-medium">
                        <th class="p-4 text-center w-20">งวดที่</th>
                        <th class="p-4 text-right">ค่างวด (บาท)</th>
                        <th class="p-4 text-right">ดอกเบี้ย (บาท)</th>
                        <th class="p-4 text-right">เงินต้นที่ลดลง (บาท)</th>
                        <th class="p-4 text-right">เงินต้นคงเหลือ (บาท)</th>
                    </tr>
                </thead>
                <tbody id="paymentTableBody" class="divide-y divide-slate-200 text-slate-700 text-sm font-mono">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        function generateAmortizationTable() {
            // ดึงค่าจากฟอร์มอินพุต
            const loanAmount = parseFloat(document.getElementById("loanAmount").value);
            const annualInterestRate = parseFloat(document.getElementById("interestRate").value);
            const years = parseInt(document.getElementById("years").value);

            // ตรวจสอบความถูกต้องของข้อมูลเบื้องต้น (Validation)
            if (isNaN(loanAmount) || loanAmount <= 0 || isNaN(annualInterestRate) || annualInterestRate < 0 || isNaN(years) || years <= 0) {
                alert("❌ กรุณากรอกข้อมูลตัวเลขให้ครบถ้วนและถูกต้อง");
                return;
            }

            // คำนวณหาจำนวนงวดทั้งหมด (เดือน) และอัตราดอกเบี้ยต่อเดือน
            const totalMonths = years * 12;
            const monthlyInterestRate = (annualInterestRate / 100) / 12;

            // คำนวณค่างวดต่อเดือนที่ต้องจ่ายเท่ากันทุกเดือนตามสูตรทางการเงิน (PMT Formula)
            let monthlyPayment = 0;
            if (monthlyInterestRate === 0) {
                monthlyPayment = loanAmount / totalMonths;
            } else {
                monthlyPayment = loanAmount * (monthlyInterestRate * Math.pow(1 + monthlyInterestRate, totalMonths)) / (Math.pow(1 + monthlyInterestRate, totalMonths) - 1);
            }

            let remainingPrincipal = loanAmount;
            let totalInterestPaid = 0;
            let tableRowsHtml = "";

            // 🔁 3. ใช้ FOR LOOP ในการคำนวณและสร้างตารางผ่อนชำระแต่ละงวด
            for (let month = 1; month <= totalMonths; month++) {
                // คำนวณดอกเบี้ยในงวดนั้นๆ (คิดจากเงินต้นคงเหลือ)
                const interestForMonth = remainingPrincipal * monthlyInterestRate;
                
                // คำนวณเงินต้นที่หักลบออกไปจริงในงวดนั้น (ค่างวด - ดอกเบี้ย)
                let principalForMonth = monthlyPayment - interestForMonth;

                // ตรวจสอบงวดสุดท้ายเพื่อป้องกันการปัดเศษตัวเลขเกินหรือขาด
                if (month === totalMonths) {
                    principalForMonth = remainingPrincipal;
                    monthlyPayment = principalForMonth + interestForMonth;
                    remainingPrincipal = 0;
                } else {
                    remainingPrincipal = remainingPrincipal - principalForMonth;
                }

                totalInterestPaid += interestForMonth;

                // ต่อข้อความแถวตาราง HTML ด้วย Template Literals
                tableRowsHtml += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-4 text-center font-semibold text-slate-500">${month}</td>
                        <td class="p-4 text-right text-slate-800 font-semibold">${monthlyPayment.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                        <td class="p-4 text-right text-amber-600">${interestForMonth.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                        <td class="p-4 text-right text-emerald-600">${principalForMonth.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                        <td class="p-4 text-right text-indigo-600 font-bold">${remainingPrincipal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                    </tr>
                `;
            }

            // คำนวณยอดชำระรวมทั้งหมด
            const totalPayment = loanAmount + totalInterestPaid;

            // 4. นำผลสรุปไปแสดงผลบนหน้าเว็บ (พร้อมแปลงรูปแบบเงินบาทด้วย .toLocaleString())
            document.getElementById("sumMonthlyPayment").innerText = monthlyPayment.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " บาท";
            document.getElementById("sumTotalInterest").innerText = totalInterestPaid.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " บาท";
            document.getElementById("sumTotalPay").innerText = totalPayment.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " บาท";

            // สั่งแทรกแถวตารางเข้าไปใน tbody และสั่งให้แสดงผลแผงสรุปและตารางออกมา
            document.getElementById("paymentTableBody").innerHTML = tableRowsHtml;
            document.getElementById("summarySection").classList.remove("hidden");
            document.getElementById("tableContainer").classList.remove("hidden");
        }
    </script>

</body>
</html>
