<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 6.2: ระบบกรองข้อมูลสินค้า (Array Filter & Conditions)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4">

    <div class="max-w-4xl mx-auto bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
        <h2 class="text-2xl font-bold text-slate-800 mb-2 text-center md:text-left">📦 ระบบจัดการและกรองข้อมูลสินค้า (Lab 6.2)</h2>
        <p class="text-slate-500 text-sm mb-6 text-center md:text-left">วิชา CSI204: แสดงและคัดกรองรายการสินค้าตามหมวดหมู่เรียลไทม์</p>
        
        <div class="bg-slate-50 p-4 rounded-xl mb-6 flex flex-col sm:flex-row sm:items-center gap-4">
            <label for="categoryFilter" class="font-semibold text-slate-700 whitespace-nowrap">🔍 เลือกหมวดหมู่สินค้าที่ต้องการดู:</label>
            <select id="categoryFilter" onchange="filterProducts()" 
                class="w-full sm:w-64 px-4 py-2 border border-slate-300 rounded-lg bg-white text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                <option value="all">🌟 ทั้งหมด (All Categories)</option>
                <option value="clothing">👕 เสื้อผ้า (Clothing)</option>
                <option value="equipment">💻 อุปกรณ์ (Equipment)</option>
                <option value="food">🍏 อาหาร (Food)</option>
            </select>
            <div class="sm:ml-auto text-sm text-slate-500">
                พบสินค้าทั้งหมด <span id="productCount" class="font-bold text-indigo-600">0</span> รายการ
            </div>
        </div>

        <div class="overflow-x-auto rounded-xl border border-slate-200">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-800 text-white text-sm font-medium">
                        <th class="p-4">#</th>
                        <th class="p-4">ชื่อสินค้า</th>
                        <th class="p-4">หมวดหมู่</th>
                        <th class="p-4 text-right">ราคา (บาท)</th>
                        <th class="p-4 text-center">สถานะสต็อก</th>
                    </tr>
                </thead>
                <tbody id="productTableBody" class="divide-y divide-slate-200 text-slate-700 text-sm">
                    </tbody>
            </table>
        </div>
        
        <div id="noDataMessage" class="hidden text-center py-10 text-slate-400 bg-slate-50 rounded-b-xl border-x border-b border-slate-200">
            📭 ไม่พบรายการสินค้าในหมวดหมู่นี้
        </div>
    </div>

    <script>
        // 1. สร้าง Array ของ Object สินค้าตามเกณฑ์ (มีชื่อ, หมวดหมู่, ราคา, สต็อก) (ตามเกณฑ์ข้อ 2)
        const products = [
            { id: 1, name: "เสื้อยืด Oversize สีดำ", category: "clothing", price: 350, stock: 15 },
            { id: 2, name: "กางเกงยีนส์ขาเดฟเดนิม", category: "clothing", price: 790, stock: 8 },
            { id: 3, name: "เมาส์ไร้สายความไวสูง (Wireless Mouse)", category: "equipment", price: 1290, stock: 4 },
            { id: 4, name: "คีย์บอร์ดกลไก RGB (Mechanical Keyboard)", category: "equipment", price: 2590, stock: 0 }, // สต็อกหมด
            { id: 5, name: "บะหมี่กึ่งสำเร็จรูปเกาหลีรสเผ็ด (แพ็ค)", category: "food", price: 145, stock: 42 },
            { id: 6, name: "เมล็ดกาแฟคั่วกลางอราบิก้า 250g", category: "food", price: 280, stock: 20 },
            { id: 7, name: "เสื้อกันหนาวมีฮู้ดสีเทา", category: "clothing", price: 950, stock: 0 }, // สต็อกหมด
            { id: 8, name: "สายชาร์จประเภท USB-C Fast Charge 2m", category: "equipment", price: 390, stock: 50 }
        ];

        // ฟังก์ชันในการดึงข้อความแปลงหมวดหมู่เป็นภาษาไทย (Optional เพื่อความสวยงาม)
        function getCategoryTH(category) {
            if (category === "clothing") return "👚 เสื้อผ้า";
            if (category === "equipment") return "💻 อุปกรณ์";
            if (category === "food") return "🍏 อาหาร";
            return category;
        }

        // 2. ฟังก์ชันหลักในการกรองและ render แสดงผลลัพธ์ (ตามเกณฑ์ข้อ 4)
        function renderTable(productList) {
            const tbody = document.getElementById("productTableBody");
            const noDataMsg = document.getElementById("noDataMessage");
            const countLabel = document.getElementById("productCount");
            
            // ล้างข้อมูลเก่าในตารางก่อนเขียนใหม่
            tbody.innerHTML = "";
            countLabel.innerText = productList.length;

            if (productList.length === 0) {
                noDataMsg.classList.remove("hidden");
                return;
            } else {
                noDataMsg.classList.add("hidden");
            }

            // ใช้ loop แบบสำหรับจัดวางแต่ละแถวข้อมูลลงใน HTML
            productList.forEach((product, index) => {
                const tr = document.createElement("tr");
                tr.className = "hover:bg-slate-50 transition-colors";

                // ตรวจสอบสถานะสต็อกเพื่อแต่งสี Badge
                let stockBadge = "";
                if (product.stock > 0) {
                    stockBadge = `<span class="bg-green-100 text-green-800 text-xs font-semibold px-2.5 py-1 rounded-full">พร้อมส่ง (${product.stock})</span>`;
                } else {
                    stockBadge = `<span class="bg-rose-100 text-rose-800 text-xs font-semibold px-2.5 py-1 rounded-full">สินค้าหมด</span>`;
                }

                tr.innerHTML = `
                    <td class="p-4 font-medium text-slate-400">${index + 1}</td>
                    <td class="p-4 font-semibold text-slate-800">${product.name}</td>
                    <td class="p-4 text-slate-600">${getCategoryTH(product.category)}</td>
                    <td class="p-4 text-right font-medium text-indigo-600">${product.price.toLocaleString('th-TH', {minimumFractionDigits: 2})}</td>
                    <td class="p-4 text-center">${stockBadge}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 3. ฟังก์ชันดักจับความเปลี่ยนแปลงของ Dropdown และคัดกรองข้อมูลด้วย .filter() + if-else if
        function filterProducts() {
            const selectedCategory = document.getElementById("categoryFilter").value;
            let filteredResult = [];

            // ประยุกต์ใช้คำสั่ง filter() ร่วมกับเงื่อนไขโครงสร้างแบบ if-else if ตามเกณฑ์โจทย์
            if (selectedCategory === "all") {
                filteredResult = products;
            } else if (selectedCategory === "clothing") {
                filteredResult = products.filter(item => item.category === "clothing");
            } else if (selectedCategory === "equipment") {
                filteredResult = products.filter(item => item.category === "equipment");
            } else if (selectedCategory === "food") {
                filteredResult = products.filter(item => item.category === "food");
            }

            // ส่งข้อมูลที่กรองเสร็จเรียบร้อยไปอัปเดตหน้าตาราง
            renderTable(filteredResult);
        }

        // สั่งให้รันฟังก์ชันแสดงผลสินค้าทั้งหมดทันทีเมื่อหน้าเว็บโหลดเสร็จครั้งแรก
        window.onload = function() {
            renderTable(products);
        };
    </script>

</body>
</html>
