<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 1.4: Form Validation</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; padding: 40px; color: #333; }
        .form-card { max-width: 450px; background: white; padding: 30px; margin: 0 auto; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #1e3a8a; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #1e3a8a; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #3b82f6; }
        .error-message { color: #dc2626; font-size: 13px; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>ฟอร์มสมัครสมาชิก (Lab 1.4)</h2>
    
    <form id="registrationForm" onsubmit="return validateForm(event)">
        
        <div class="form-group">
            <label for="name">ชื่อ-นามสกุล:</label>
            <input type="text" id="name" placeholder="กรุณากรอกชื่อ-นามสกุล">
            <div id="nameError" class="error-message"></div>
        </div>

        <div class="form-group">
            <label for="email">อีเมล:</label>
            <input type="email" id="email" placeholder="example@email.com">
            <div id="emailError" class="error-message"></div>
        </div>

        <div class="form-group">
            <label for="phone">เบอร์โทรศัพท์:</label>
            <input type="text" id="phone" placeholder="กรุณากรอกเบอร์โทรศัพท์ 10 หลัก">
            <div id="phoneError" class="error-message"></div>
        </div>

        <div class="form-group">
            <label for="password">รหัสผ่าน:</label>
            <input type="password" id="password" placeholder="อย่างน้อย 6 ตัวอักษร">
            <div id="passwordError" class="error-message"></div>
        </div>

        <button type="submit">สมัครสมาชิก</button>
    </form>
</div>

<script>
    function validateForm(event) {
        // 1. ระงับการส่งฟอร์มเพื่อเคลียร์การเช็กข้อมูลก่อน
        event.preventDefault();

        // 2. ดึงค่าจาก Input และใช้ .trim() ตัดช่องว่างส่วนเกินออก
        let name = document.getElementById("name").value.trim();
        let email = document.getElementById("email").value.trim();
        let phone = document.getElementById("phone").value.trim();
        let password = document.getElementById("password").value; // รหัสผ่านไม่ใช้ trim เผื่อผู้ใช้ตั้งใจตั้งรหัสมี space

        // 3. ดึง Element ข้อความ Error
        let nameError = document.getElementById("nameError");
        let emailError = document.getElementById("emailError");
        let phoneError = document.getElementById("phoneError");
        let passwordError = document.getElementById("passwordError");

        // 4. รีเซ็ตสถานะ Error ทุกครั้งที่กดซับมิตใหม่ (ป้องกันบัคข้อความค้าง)
        let hasError = false;
        nameError.style.display = "none";
        emailError.style.display = "none";
        phoneError.style.display = "none";
        passwordError.style.display = "none";

        // --- เริ่มต้นตรวจสอบเงื่อนไข ---

        // ตรวจสอบชื่อ
        if (name === "") {
            nameError.innerText = "กรุณากรอกชื่อ-นามสกุลของคุณ";
            nameError.style.display = "block";
            hasError = true;
        }

        // ตรวจสอบอีเมลด้วย Regex
        let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (email === "") {
            emailError.innerText = "กรุณากรอกอีเมล";
            emailError.style.display = "block";
            hasError = true;
        } else if (!emailRegex.test(email)) {
            emailError.innerText = "รูปแบบอีเมลไม่ถูกต้อง (ตัวอย่าง: name@domain.com)";
            emailError.style.display = "block";
            hasError = true;
        }

        // ตรวจสอบเบอร์โทรศัพท์ (ต้องเป็นตัวเลขล้วน 10 หลักเท่านั้น)
        let phoneRegex = /^[0-9]{10}$/;
        if (phone === "") {
            phoneError.innerText = "กรุณากรอกเบอร์โทรศัพท์";
            phoneError.style.display = "block";
            hasError = true;
        } else if (!phoneRegex.test(phone)) {
            phoneError.innerText = "เบอร์โทรศัพท์ต้องเป็นตัวเลข 10 หลักเท่านั้น";
            phoneError.style.display = "block";
            hasError = true;
        }

        // ตรวจสอบรหัสผ่าน
        if (password === "") {
            passwordError.innerText = "กรุณากรอกรหัสผ่าน";
            passwordError.style.display = "block";
            hasError = true;
        } else if (password.length < 6) {
            passwordError.innerText = "รหัสผ่านต้องมีความยาวไม่ต่ำกว่า 6 ตัวอักษร";
            passwordError.style.display = "block";
            hasError = true;
        }

        // 5. หากมี Error ใดๆ เกิดขึ้น ให้หยุดการทำงานทันที
        if (hasError) {
            return false;
        }

        // 6. หากถูกต้องหมดทุกช่อง ทำการแจ้งเตือนสำเร็จ
        alert("สมัครสมาชิกสำเร็จเรียบร้อยแล้ว!");
        
        console.log("--- Log ข้อมูลที่ผ่านการตรวจสอบบัค ---");
        console.log("ชื่อ:", name);
        console.log("อีเมล:", email);
        console.log("เบอร์โทร:", phone);

        return true;
    }
</script>

</body>
</html>
